<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChronoPersona 2D Agent</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #fafafa; }
        canvas { border: 1px solid #333; background: #fff; display: block; }
        #controls { margin-top: 10px; }
        #msg { width: 300px; padding: 5px; }
        #log { width: 600px; height: 120px; overflow-y: scroll; border: 1px solid #ccc; margin-top: 10px; padding: 5px; background: #fff; font-size: 12px; }
    </style>
</head>
<body>
    <h2>ChronoPersona 2D Agent (MVA)</h2>
    <canvas id="world" width="400" height="400"></canvas>
    <div id="controls">
        <input id="msg" type="text" placeholder="Say something..." />
        <button onclick="sendMsg()">Send</button>
    </div>
    <div id="log"></div>
    <script src="canvas.js"></script>
</body>
</html>
